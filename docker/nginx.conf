server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # HSTS is set by upstream TLS terminator; do not set here.

    # ── Gzip ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf;

    # Hide nginx version.
    server_tokens off;

    # Reasonable upload size.
    client_max_body_size 2m;

    # ── Frontend health endpoint (plain text, no SPA, no JS) ────────────
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "BBS Core Frontend OK\nVersion: 0.1.2\nBuild: production-foundation\nEnvironment: production\n";
    }

    # ── Deny hidden files (.git, .env, etc.) ────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # ── Hashed static assets: long cache, immutable ─────────────────────
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── Common static file types ────────────────────────────────────────
    location ~* \.(?:ico|gif|jpe?g|png|webp|svg|woff2?|ttf|otf|eot)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # ── HTML entry: never cache (so deploys propagate instantly) ────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── SPA fallback ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse proxy to backend API service ────────────────────────────
    location /api/ {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
