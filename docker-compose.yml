# BBS Core v0.1.2 — docker-compose stack
# Build: production-foundation
#
# Quick start:
#   cp .env.example .env   # then edit values
#   docker compose up -d --build
#
# Services:
#   db        MariaDB 11 (persistent volume bbs_db_data)
#   backend   Node.js Express API
#   frontend  nginx serving static SPA + /api reverse proxy
#
# Required env vars (set in .env or export before running):
#   DB_PASSWORD, APP_SECRET
#
# NEVER run `docker compose down -v` — it deletes the database volume.

services:
  db:
    image: mariadb:11
    container_name: bbs_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-bbs_core}
      MARIADB_USER: ${DB_USER:-bbs}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - bbs_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [bbs_net]

  backend:
    build:
      context: ./backend
    container_name: bbs_backend
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-bbs_core}
      DB_USER: ${DB_USER:-bbs}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_SECRET: ${APP_SECRET}
      PORT: ${PORT:-4000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_PATH: ${BACKUP_PATH:-/backups}
    volumes:
      # Host-mounted backups directory. SQL dumps land here, timestamped.
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Uses node + http (no curl/wget needed in image).
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://127.0.0.1:'+(process.env.PORT||4000)+'/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [bbs_net]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbs_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [bbs_net]

volumes:
  bbs_db_data:

networks:
  bbs_net:
    driver: bridge
