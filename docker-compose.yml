# BBS Core v0.1.0 — docker-compose stack
# Tested target: Hetzner VPS with Docker + Portainer.
#
# Quick start:
#   cp .env.example .env   # then edit values
#   docker compose up -d --build
#
# Services:
#   db        MariaDB 11 (persistent volume bbs_db_data)
#   backend   Node.js Express API
#   frontend  nginx serving static SPA + /api reverse proxy
#
# Required env vars (set in .env or export before running):
#   DB_PASSWORD, APP_SECRET, SUPERADMIN_USERNAME, SUPERADMIN_PASSWORD
#
# Optional env vars with sensible defaults are shown inline below.

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-bbs_core}
      MARIADB_USER: ${DB_USER:-bbs}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - bbs_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bbs_net]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-bbs_core}
      DB_USER: ${DB_USER:-bbs}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_SECRET: ${APP_SECRET}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-ChangeMe!Admin123}
      PORT: ${PORT:-4000}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_PATH: ${BACKUP_PATH:-/backups}
    volumes:
      # Host-mounted backups directory. SQL dumps land here, timestamped.
      # NEVER add the MariaDB data volume here and NEVER run
      # `docker compose down -v` — it deletes the database.
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks: [bbs_net]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks: [bbs_net]

volumes:
  bbs_db_data:

networks:
  bbs_net:
    driver: bridge
